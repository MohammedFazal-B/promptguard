openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PromptGuard API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: promptguard
    description: PromptGuard attack/defense operations
  - name: anthropic
    description: Anthropic AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /promptguard/simulate-attack:
    post:
      operationId: simulateAttack
      tags: [promptguard]
      summary: Simulate a prompt injection attack using Claude
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttackSimInput"
      responses:
        "200":
          description: Attack simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttackSimResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /promptguard/test-defense:
    post:
      operationId: testDefense
      tags: [promptguard]
      summary: Test defense mechanisms against a payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DefenseTestInput"
      responses:
        "200":
          description: Defense test result with side-by-side comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefenseTestResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /promptguard/analyze-message:
    post:
      operationId: analyzeMessage
      tags: [promptguard]
      summary: Analyze a chat message for injection attempts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageAnalysisInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageAnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /promptguard/chat:
    post:
      operationId: redTeamChat
      tags: [promptguard]
      summary: Send a message to the red-team agent (vulnerable or hardened mode)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedTeamChatInput"
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedTeamChatResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /promptguard/stats:
    get:
      operationId: getStats
      tags: [promptguard]
      summary: Get platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /promptguard/audit-log:
    get:
      operationId: getAuditLog
      tags: [promptguard]
      summary: Get recent audit log entries
      responses:
        "200":
          description: List of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AttackSimInput:
      type: object
      required: [attackType, payload]
      properties:
        attackType:
          type: string
          description: "One of: direct_injection, indirect_rag, multi_agent, jailbreak_roleplay, goal_hijacking, data_exfiltration"
        payload:
          type: string
          description: The attack payload text

    AttackSimResult:
      type: object
      required: [attackType, payload, vulnerableResponse, attackSucceeded, dataExposed, analysisNotes]
      properties:
        attackType:
          type: string
        payload:
          type: string
        vulnerableResponse:
          type: string
          description: What the vulnerable AI assistant responded
        attackSucceeded:
          type: boolean
        dataExposed:
          type: string
          description: What sensitive data or capabilities were exposed
        analysisNotes:
          type: string

    DefenseConfig:
      type: object
      properties:
        inputSanitization:
          type: boolean
        delimiterEnforcement:
          type: boolean
        intentClassifier:
          type: boolean
        leastPrivilege:
          type: boolean
        outputValidation:
          type: boolean
        auditLogger:
          type: boolean

    DefenseTestInput:
      type: object
      required: [attackType, payload, defenses]
      properties:
        attackType:
          type: string
        payload:
          type: string
        defenses:
          $ref: "#/components/schemas/DefenseConfig"

    DefenseTestResult:
      type: object
      required: [payload, undefendedResponse, defendedResponse, defenseScore, triggeredDefenses, attackBlocked]
      properties:
        payload:
          type: string
        undefendedResponse:
          type: string
        defendedResponse:
          type: string
        defenseScore:
          type: integer
          description: 0-100 defense score
        triggeredDefenses:
          type: array
          items:
            type: string
        attackBlocked:
          type: boolean
        sanitizedPayload:
          type: ["string", "null"]

    MessageAnalysisInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
        conversationHistory:
          type: array
          items:
            type: string

    MessageAnalysisResult:
      type: object
      required: [injectionDetected, threatLevel, confidence, triggeredPatterns]
      properties:
        injectionDetected:
          type: boolean
        threatLevel:
          type: string
          description: "LOW, MEDIUM, HIGH, or CRITICAL"
        confidence:
          type: integer
          description: 0-100 confidence score
        triggeredPatterns:
          type: array
          items:
            type: string
        reasoning:
          type: string

    RedTeamChatInput:
      type: object
      required: [message, mode]
      properties:
        message:
          type: string
        mode:
          type: string
          description: "vulnerable or hardened"
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
        content:
          type: string

    RedTeamChatResult:
      type: object
      required: [response, mode]
      properties:
        response:
          type: string
        mode:
          type: string

    PlatformStats:
      type: object
      required: [attacksSimulated, defensesTested, vulnerabilitiesFound, activeDefenses]
      properties:
        attacksSimulated:
          type: integer
        defensesTested:
          type: integer
        vulnerabilitiesFound:
          type: integer
        activeDefenses:
          type: integer

    AuditEntry:
      type: object
      required: [id, timestamp, action, input, output, defenseTriggered]
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        action:
          type: string
        input:
          type: string
        output:
          type: string
        defenseTriggered:
          type: boolean
        details:
          type: ["string", "null"]

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    AnthropicConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    AnthropicMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
