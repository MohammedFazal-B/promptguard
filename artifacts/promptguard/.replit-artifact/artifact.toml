kind = "web"
previewPath = "/"
title = "PromptGuard"
version = "1.0.0"
id = "artifacts/promptguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21670

[services.development]
run = "pnpm --filter @workspace/promptguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/promptguard", "run", "build" ]
publicDir = "artifacts/promptguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21670"
BASE_PATH = "/"
